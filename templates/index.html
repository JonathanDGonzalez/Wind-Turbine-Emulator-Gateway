<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gateway Eólico - Uniandes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .led { width: 15px; height: 15px; border-radius: 50%; display: inline-block; vertical-align: middle;}
        .bg-on { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .bg-off { background-color: #e74c3c; }
        .display-frec { font-size: 3.5rem; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <h5 class="text-muted">EMULADOR EÓLICO 300W</h5>
                <div class="display-frec"><span id="frec">0.0</span> <small class="h4">Hz</small></div>
                <div class="badge bg-primary h5 p-2 mt-2" id="modo_txt">CARGANDO...</div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h6 class="card-title">Control Manual</h6>
                <div class="input-group mb-3">
                    <span class="input-group-text">Frecuencia (Hz)</span>
                    <input type="number" id="input_frec_manual" class="form-control text-center" value="60.0" step="0.1" min="0" max="130">
                    <button class="btn btn-primary" id="btn_fijar" onclick="fijarFrecuencia()">Aplicar</button>
                </div>
                <div class="row g-2">
                    <div class="col-6"><button id="btn_start" onclick="cmd('start')" class="btn btn-success w-100 py-2">ARRANCAR</button></div>
                    <div class="col-6"><button id="btn_stop" onclick="cmd('stop')" class="btn btn-danger w-100 py-2">PARADA</button></div>
                </div>
            </div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-12"><button id="btn_perfil" onclick="cmd('perfil')" class="btn btn-outline-dark w-100 py-2">Iniciar Perfil de Viento (.CSV)</button></div>
            <div class="col-12"><button id="btn_recuperar" onclick="cmd('recuperar')" class="btn btn-warning w-100 py-2" style="display:none;">Recuperar Control de SCADA</button></div>
        </div>

        <div class="card">
            <div class="card-body">
                <h6 class="mb-3">Estado de Redes</h6>
                <div class="d-flex justify-content-between mb-2">
                    <span>PowerFlex 525 (RTU):</span>
                    <span id="led_rtu" class="led bg-off"></span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>SCADA (TCP):</span>
                    <span id="led_tcp" class="led bg-off"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function cmd(accion) { 
            fetch('/api/control/' + accion, {method:'POST'}); 
        }
        
        function fijarFrecuencia() {
            let valorStr = document.getElementById('input_frec_manual').value.replace(',', '.');
            let valorNum = parseFloat(valorStr);
            if(isNaN(valorNum) || valorNum < 0 || valorNum > 130) {
                alert("Por favor ingresa una frecuencia válida.");
                return;
            }
            fetch('/api/set_frec', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ frecuencia: valorNum })
            });
            cmd('start'); // Auto arrancar al fijar frecuencia (comportamiento manual)
        }
        
        setInterval(() => {
            fetch('/api/status').then(r => r.json()).then(data => {
                document.getElementById('frec').innerText = data.frecuencia.toFixed(1);
                document.getElementById('modo_txt').innerText = "MODO: " + data.modo;
                
                document.getElementById('led_rtu').className = 'led ' + (data.hardware_rtu ? 'bg-on' : 'bg-off');
                document.getElementById('led_tcp').className = 'led ' + (data.hardware_tcp ? 'bg-on' : 'bg-off');

                // Lógica de jerarquía: Bloquear botones si el SCADA tiene el control
                let esScada = (data.modo === "SCADA");
                document.getElementById('btn_start').disabled = esScada;
                document.getElementById('btn_perfil').disabled = esScada;
                document.getElementById('btn_fijar').disabled = esScada;
                document.getElementById('input_frec_manual').disabled = esScada;
                
                // Mostrar botón de recuperar solo si SCADA está activo
                document.getElementById('btn_recuperar').style.display = esScada ? 'block' : 'none';
            });
        }, 800);
    </script>
</body>
</html>
